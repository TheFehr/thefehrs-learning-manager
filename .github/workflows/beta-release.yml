name: Beta Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check Formatting
        run: npm run fmt:check

      - name: Run Tests
        run: npm run test

      - name: Build the module
        run: npm run build

      - name: Calculate Beta Version
        id: vars
        run: |
          VERSION=$(jq -r '.version' package.json)
          BETA_TAG="v${VERSION}-beta"
          echo "BETA_TAG=${BETA_TAG}" >> $GITHUB_OUTPUT
          echo "VERSION_CLEAN=${VERSION}-beta" >> $GITHUB_OUTPUT

      - name: Update module.json with beta release information
        run: |
          VERSION_CLEAN="${{ steps.vars.outputs.VERSION_CLEAN }}"
          BETA_TAG="${{ steps.vars.outputs.BETA_TAG }}"
          URL="https://github.com/${{ github.repository }}"
          MANIFEST="${URL}/releases/download/latest-beta/module.json"
          DOWNLOAD="${URL}/releases/download/latest-beta/thefehrs-learning-manager.zip"

          jq --arg version "$VERSION_CLEAN" \
             --arg url "$URL" \
             --arg manifest "$MANIFEST" \
             --arg download "$DOWNLOAD" \
             '.version = $version | .url = $url | .manifest = $manifest | .download = $download' \
             dist/module.json > dist/module.json.tmp && mv dist/module.json.tmp dist/module.json

      - name: Zip the distribution folder
        run: |
          cd dist
          zip -r ../thefehrs-learning-manager.zip ./*

      - name: Create or Update GitHub Pre-Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name: Beta Release ${{ steps.vars.outputs.BETA_TAG }}
          tag: latest-beta
          commit: ${{ github.sha }}
          draft: false
          prerelease: true
          makeLatest: false
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "./thefehrs-learning-manager.zip, ./dist/module.json"
          generateReleaseNotes: true
          body: "This is an automated beta release from the latest commit on main. Version: ${{ steps.vars.outputs.BETA_TAG }}"
