name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pipeline-${{ github.ref_name }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Setup and Cache
        id: setup-and-cache
        uses: ./.github/actions/setup-and-cache
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check Formatting
        run: npm run fmt:check

      - name: Run Tests
        run: npm run test

  release:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: latest-beta
      cancel-in-progress: true
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Setup and Cache
        id: setup-and-cache
        uses: ./.github/actions/setup-and-cache
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build the module
        run: npm run build

      - name: Calculate Release Information
        id: release-info
        run: |
          URL="https://github.com/${{ github.repository }}"

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Full Release
            VERSION="${GITHUB_REF#refs/tags/}"
            VERSION_CLEAN="${VERSION#v}"
            echo "IS_BETA=false" >> $GITHUB_OUTPUT
            echo "VERSION_CLEAN=$VERSION_CLEAN" >> $GITHUB_OUTPUT
            echo "RELEASE_NAME=Release $VERSION" >> $GITHUB_OUTPUT
            echo "RELEASE_TAG=$VERSION" >> $GITHUB_OUTPUT
            echo "MANIFEST_URL=$URL/releases/latest/download/module.json" >> $GITHUB_OUTPUT
            echo "DOWNLOAD_URL=$URL/releases/download/${VERSION}/thefehrs-learning-manager.zip" >> $GITHUB_OUTPUT
            
            # Empty release notes for full release (will be generated by GitHub)
            touch release_notes.md
          else
            # Beta Release
            VERSION=$(jq -r '.version' package.json)
            BETA_TAG="v${VERSION}-beta.${{ github.run_number }}"
            
            # Find the last tag that is not "latest-beta"
            git fetch --tags --force
            LAST_TAG=$(git describe --tags --abbrev=0 --exclude=latest-beta 2>/dev/null || echo "")
            
            if [ -n "$LAST_TAG" ]; then
              CHANGELOG=$(git log ${LAST_TAG}..HEAD --oneline --no-merges --reverse | sed 's/^[[:xdigit:]]\+ /- /')
              CHANGELOG_FULL=$(printf "## Changes since %s\n\n%s\n\n**Full Changelog**: %s/compare/%s...latest-beta" "$LAST_TAG" "$CHANGELOG" "$URL" "$LAST_TAG")
            else
              CHANGELOG_FULL="First Beta Release"
            fi

            echo "IS_BETA=true" >> $GITHUB_OUTPUT
            echo "VERSION_CLEAN=${VERSION}-beta.${{ github.run_number }}" >> $GITHUB_OUTPUT
            echo "RELEASE_NAME=Beta Release $BETA_TAG" >> $GITHUB_OUTPUT
            echo "RELEASE_TAG=latest-beta" >> $GITHUB_OUTPUT
            echo "MANIFEST_URL=$URL/releases/download/latest-beta/module.json" >> $GITHUB_OUTPUT
            echo "DOWNLOAD_URL=$URL/releases/download/latest-beta/thefehrs-learning-manager.zip" >> $GITHUB_OUTPUT
            
            # Populate release notes for beta release
            printf '%s\n' "$CHANGELOG_FULL" > release_notes.md
          fi

      - name: Update module.json with release information
        run: |
          VERSION_CLEAN="${{ steps.release-info.outputs.VERSION_CLEAN }}"
          MANIFEST="${{ steps.release-info.outputs.MANIFEST_URL }}"
          DOWNLOAD="${{ steps.release-info.outputs.DOWNLOAD_URL }}"
          URL="https://github.com/${{ github.repository }}"

          jq --arg version "$VERSION_CLEAN" \
             --arg url "$URL" \
             --arg manifest "$MANIFEST" \
             --arg download "$DOWNLOAD" \
             '.version = $version | .url = $url | .manifest = $manifest | .download = $download' \
             dist/module.json > dist/module.json.tmp && mv dist/module.json.tmp dist/module.json

      - name: Zip the distribution folder
        run: |
          cd dist
          zip -r ../thefehrs-learning-manager.zip ./*

      - name: Preflight checks
        if: steps.release-info.outputs.IS_BETA == 'false'
        env:
          FOUNDRY_API_TOKEN: ${{ secrets.FOUNDRY_API_TOKEN }}
        run: |
          if [ -z "$FOUNDRY_API_TOKEN" ]; then
            echo "Error: FOUNDRY_API_TOKEN is empty or not set."
            exit 1
          fi

          MIN_COMPAT=$(jq -r '.compatibility.minimum' dist/module.json)
          VERIFIED_COMPAT=$(jq -r '.compatibility.verified' dist/module.json)
          MAX_COMPAT=$(jq -r '.compatibility.maximum' dist/module.json)

          if [ -z "$MIN_COMPAT" ] || [ "$MIN_COMPAT" = "null" ] || [ -z "$VERIFIED_COMPAT" ] || [ "$VERIFIED_COMPAT" = "null" ]; then
            echo "Error: Required compatibility fields 'minimum' and 'verified' are missing or null."
            exit 1
          fi

      - name: Create or Update GitHub Release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          allowUpdates: true
          name: ${{ steps.release-info.outputs.RELEASE_NAME }}
          tag: ${{ steps.release-info.outputs.RELEASE_TAG }}
          bodyFile: "release_notes.md"
          commit: ${{ github.sha }}
          draft: false
          prerelease: ${{ steps.release-info.outputs.IS_BETA == 'true' }}
          makeLatest: ${{ steps.release-info.outputs.IS_BETA == 'false' }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "./thefehrs-learning-manager.zip, ./dist/module.json"
          generateReleaseNotes: ${{ steps.release-info.outputs.IS_BETA == 'false' }}

      - name: Notify Foundry VTT Package Release
        if: steps.release-info.outputs.IS_BETA == 'false'
        env:
          FOUNDRY_API_TOKEN: ${{ secrets.FOUNDRY_API_TOKEN }}
        run: |
          # 1. Extract version from tag
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION_CLEAN="${VERSION#v}"

          # 2. Extract compatibility info from the built module.json
          MIN_COMPAT=$(jq -r '.compatibility.minimum' dist/module.json)
          VERIFIED_COMPAT=$(jq -r '.compatibility.verified' dist/module.json)
          MAX_COMPAT=$(jq -r '.compatibility.maximum' dist/module.json)

          # 3. Construct the JSON payload
          # We use jq to build the JSON string safely to avoid escaping issues with shell variables
          PAYLOAD=$(jq -n \
            --arg id "thefehrs-learning-manager" \
            --arg ver "$VERSION_CLEAN" \
            --arg manifest "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/module.json" \
            --arg notes "https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}" \
            --arg min "$MIN_COMPAT" \
            --arg verified "$VERIFIED_COMPAT" \
            --arg max "$MAX_COMPAT" \
            '{
              id: $id,
              "dry-run": false,
              release: {
                version: $ver,
                manifest: $manifest,
                notes: $notes,
                compatibility: ({minimum: $min, verified: $verified, maximum: $max} | with_entries(select(.key == "minimum" or .key == "verified" or (.value != "null" and .value != ""))))
              }
            }')

          # 4. Send the request
          CURL_EXIT=0
          RESPONSE=$(curl -sS --fail-with-body -w "\n%{http_code}" \
            --connect-timeout 10 \
            --max-time 30 \
            -X POST "https://foundryvtt.com/_api/packages/release_version/" \
            -H "Content-Type: application/json" \
            -H "Authorization: $FOUNDRY_API_TOKEN" \
            -d "$PAYLOAD") || CURL_EXIT=$?

          if [ "$CURL_EXIT" -ne 0 ] && [ "$CURL_EXIT" -ne 22 ]; then
            echo "Error: curl command failed with exit code $CURL_EXIT (transport/timeout error)"
            echo "Response Body: $RESPONSE"
            exit "$CURL_EXIT"
          fi

          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_STATUS" -ge 400 ]; then
            echo "Error: HTTP request failed with status $HTTP_STATUS"
            echo "Response Body: $BODY"
            exit 1
          fi

          echo "Success: HTTP status $HTTP_STATUS"
          echo "Response Body: $BODY"
