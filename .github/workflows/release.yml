name: Release Module

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check Formatting
        run: npm run fmt:check

      - name: Run Tests
        run: npm run test

      - name: Build the module
        run: npm run build

      - name: Update module.json with release information
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION_CLEAN="${VERSION#v}"
          URL="https://github.com/${{ github.repository }}"
          MANIFEST="${URL}/releases/latest/download/module.json"
          DOWNLOAD="${URL}/releases/download/${VERSION}/thefehrs-learning-manager.zip"

          jq --arg version "$VERSION_CLEAN" \
             --arg url "$URL" \
             --arg manifest "$MANIFEST" \
             --arg download "$DOWNLOAD" \
             '.version = $version | .url = $url | .manifest = $manifest | .download = $download' \
             dist/module.json > dist/module.json.tmp && mv dist/module.json.tmp dist/module.json

      - name: Zip the distribution folder
        run: |
          cd dist
          zip -r ../thefehrs-learning-manager.zip ./*

      - name: Preflight checks
        env:
          FOUNDRY_API_TOKEN: ${{ secrets.FOUNDRY_API_TOKEN }}
        run: |
          if [ -z "$FOUNDRY_API_TOKEN" ]; then
            echo "Error: FOUNDRY_API_TOKEN is empty or not set."
            exit 1
          fi

          MIN_COMPAT=$(jq -r '.compatibility.minimum' dist/module.json)
          VERIFIED_COMPAT=$(jq -r '.compatibility.verified' dist/module.json)
          MAX_COMPAT=$(jq -r '.compatibility.maximum' dist/module.json)

          if [ -z "$MIN_COMPAT" ] || [ "$MIN_COMPAT" = "null" ] || [ -z "$VERIFIED_COMPAT" ] || [ "$VERIFIED_COMPAT" = "null" ]; then
            echo "Error: Required compatibility fields 'minimum' and 'verified' are missing or null."
            exit 1
          fi

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "./thefehrs-learning-manager.zip, ./dist/module.json"
          generateReleaseNotes: true

      - name: Notify Foundry VTT Package Release
        env:
          FOUNDRY_API_TOKEN: ${{ secrets.FOUNDRY_API_TOKEN }}
        run: |
          # 1. Extract version from tag
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION_CLEAN="${VERSION#v}"

          # 2. Extract compatibility info from the built module.json
          MIN_COMPAT=$(jq -r '.compatibility.minimum' dist/module.json)
          VERIFIED_COMPAT=$(jq -r '.compatibility.verified' dist/module.json)
          MAX_COMPAT=$(jq -r '.compatibility.maximum' dist/module.json)

          # 3. Construct the JSON payload
          # We use jq to build the JSON string safely to avoid escaping issues with shell variables
          PAYLOAD=$(jq -n \
            --arg id "thefehrs-learning-manager" \
            --arg ver "$VERSION_CLEAN" \
            --arg manifest "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/module.json" \
            --arg notes "https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}" \
            --arg min "$MIN_COMPAT" \
            --arg verified "$VERIFIED_COMPAT" \
            --arg max "$MAX_COMPAT" \
            '{
              id: $id,
              "dry-run": false,
              release: {
                version: $ver,
                manifest: $manifest,
                notes: $notes,
                compatibility: ({minimum: $min, verified: $verified, maximum: $max} | with_entries(select(.key == "minimum" or .key == "verified" or (.value != "null" and .value != ""))))
              }
            }')

          # 4. Send the request
          CURL_EXIT=0
          RESPONSE=$(curl -sS --fail-with-body -w "\n%{http_code}" \
            --connect-timeout 10 \
            --max-time 30 \
            -X POST "https://foundryvtt.com/_api/packages/release_version/" \
            -H "Content-Type: application/json" \
            -H "Authorization: $FOUNDRY_API_TOKEN" \
            -d "$PAYLOAD") || CURL_EXIT=$?

          if [ "$CURL_EXIT" -ne 0 ] && [ "$CURL_EXIT" -ne 22 ]; then
            echo "Error: curl command failed with exit code $CURL_EXIT (transport/timeout error)"
            echo "Response Body: $RESPONSE"
            exit "$CURL_EXIT"
          fi

          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_STATUS" -ge 400 ]; then
            echo "Error: HTTP request failed with status $HTTP_STATUS"
            echo "Response Body: $BODY"
            exit 1
          fi

          echo "Success: HTTP status $HTTP_STATUS"
          echo "Response Body: $BODY"
